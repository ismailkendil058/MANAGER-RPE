<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hors Ligne - Recyclage Pro</title>
    <style>
        :root {
            --primary: #132b6e;
            --bg: #F9FBFF;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 24px;
            text-align: center;
            overflow: hidden;
        }

        .card {
            background: white;
            padding: 48px 32px;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            max-width: 400px;
            width: 100%;
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: var(--primary);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
            box-shadow: 0 15px 30px rgba(19, 43, 110, 0.2);
        }

        .icon {
            font-size: 32px;
            animation: pulse 2s infinite;
        }

        h1 {
            font-size: 24px;
            font-weight: 900;
            color: #0f172a;
            margin: 0 0 12px;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 15px;
            color: #64748b;
            line-height: 1.6;
            margin: 0 0 32px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #f1f5f9;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
            color: #475569;
            margin-bottom: 32px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #ef4444;
            border-radius: 50%;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 18px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            box-shadow: 0 10px 20px rgba(19, 43, 110, 0.15);
        }

        .btn:active {
            transform: scale(0.96);
            opacity: 0.9;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="icon-box">
            <span class="icon">📡</span>
        </div>
        <div class="status-badge">
            <div class="dot"></div>
            Hors Connexion
        </div>
        <h1>Pas d'Internet</h1>
        <p>L'application Recyclage Pro nécessite une connexion pour charger de nouvelles données. <br><br>Cependant,
            vous pouvez toujours accéder aux sections déjà consultées.</p>
        <button class="btn" onclick="window.location.reload()">Rafraîchir la Page</button>
    </div>
</body>

</html>
